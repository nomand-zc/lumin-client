# Pre-commit configuration for lumin-client
# 确保代码质量符合项目"统一抽象、简洁高效"的设计理念

repos:
  # =========================
  # Go 代码质量检查
  # =========================

  # go fmt - 格式化 Go 代码
  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.14.0
    hooks:
      - id: pretty-format-golang
        args: [--autofix]

  # golangci-lint - 综合代码检查（包含 goimports, go vet 等）
  - repo: https://github.com/golangci/golangci-lint
    rev: v1.64.8
    hooks:
      - id: golangci-lint
        args: [--timeout=5m]

  # go mod tidy - 依赖整理
  - repo: https://github.com/tekwizely/pre-commit-golang
    rev: v1.0.0-rc.1
    hooks:
      - id: go-mod-tidy

  # =========================
  # 通用代码质量检查
  # =========================

  # 检查行尾空白
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^testdata/

  # 确保文件以换行符结尾
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
        exclude: ^testdata/

  # 防止大文件提交
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=500]

  # 检查 YAML 文件语法
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: [--unsafe]

  # 检查 JSON 文件语法
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-json
        exclude: ^testdata/

  # 检查合并冲突标记
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict

  # =========================
  # Markdown 文档检查
  # =========================

  # Markdown 格式化 - 保持文档整洁
  - repo: https://github.com/jackdewinter/pymarkdown
    rev: v0.9.29
    hooks:
      - id: pymarkdown
        args: [fix]

# =========================
# 全局配置
# =========================
default_language_version:
  python: python3

# 跳过测试数据目录和自动生成文件
exclude: |
  (?x)^(
    testdata/|
    \.codebuddy/|
    docs/references/|
    .*_generated\.go$
  )
